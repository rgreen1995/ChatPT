name: Poetry ci checks

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Pip install poetry
      run: |
        # Install poetry for env
        pip install poetry==1.6.1
    - name: Install dependencies
      run: |
        poetry install
    - name: Check formatting
      run: make check-format
    - name: Run tests
      run: make test